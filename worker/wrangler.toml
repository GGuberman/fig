name = "fig-sync"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace for users, data, and attestations.
# Create one with: wrangler kv namespace create TRACKER_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "TRACKER_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets (set via `wrangler secret put`, never committed):
#   WORLD_ID_APP_ID  — App ID from developer.worldcoin.org
#   ATTEST_KEY       — 32-byte hex; HMAC key for signing attestations
#                       (generate with: openssl rand -hex 32)
